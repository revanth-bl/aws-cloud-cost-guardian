name: Deploy AWS Cloud Cost Guardian

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Lambda Function
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip unzip

      - name: Create Deployment Package
        run: |
          mkdir -p build
          cd lambda
          zip -r ../build/lambda.zip .

      - name: Verify Deployment Package
        run: |
          ls -lh build
          unzip -l build/lambda.zip

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name aws-cost-optimization-toolkit \
            --zip-file fileb://build/lambda.zip

      - name: Wait for Deployment
        run: |
          aws lambda wait function-updated \
            --function-name aws-cost-optimization-toolkit

      - name: Deployment Successful
        run: echo "✅ AWS Cloud Cost Guardian deployed successfully!"